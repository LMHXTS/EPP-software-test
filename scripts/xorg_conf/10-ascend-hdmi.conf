# Xorg 强制配置 — Atlas 200I DK A2 HDMI 输出
# 路径: /etc/X11/xorg.conf.d/10-ascend-hdmi.conf
#
# 背景: ascend_vdp_drm 私有驱动下 EDID 读取失败,
#       modesetting 驱动探测到 VGA-1 但因缺少显示器参数而回退到
#       虚拟帧缓冲("default" 1707x1067), 导致 HDMI 无实际输出.
# 此配置强制指定:
#   1. 使用 modesetting 驱动 + /dev/dri/card0
#   2. 定义 HDMI 显示器的标准 1920x1080@60 模式(绕过 EDID)
#   3. 绑定设备-显示器-屏幕的完整链路

Section "Device"
    Identifier  "AscendGPU"
    Driver      "modesetting"
    Option      "AccelMethod"   "none"
    Option      "kmsdev"        "/dev/dri/card0"
EndSection

Section "Monitor"
    Identifier  "HDMI-0"
    # 标准 1920x1080@60Hz CVT 模式行 (绕过 EDID 读取)
    Modeline    "1920x1080_60.00"  148.50  1920 2008 2052 2200  1080 1084 1089 1125 +hsync +vsync
    Option      "PreferredMode" "1920x1080_60.00"
    Option      "Enable" "true"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "AscendGPU"
    Monitor     "HDMI-0"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080_60.00"
    EndSubSection
EndSection
